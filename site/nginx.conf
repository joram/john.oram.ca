server {
    listen 3000;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Avoid redirects that expose internal port 3000 to the VeilStream ingress.
    absolute_redirect off;
    port_in_redirect off;

    location / {
        try_files $uri $uri/ $uri/index.html =404;
    }
}
